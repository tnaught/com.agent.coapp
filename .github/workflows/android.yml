name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build & Verify APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Static verification
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          echo "=== Package Info ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump badging "$APK_PATH" | head -3
          echo ""
          echo "=== Application Label ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump badging "$APK_PATH" | grep "application-label"
          echo ""
          echo "=== Permissions ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump permissions "$APK_PATH"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  emulator-test:
    name: Emulator Screenshot Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD Screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_5
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Installing APK ==="
            adb install apk/app-debug.apk

            echo "=== Verify package ==="
            adb shell pm list packages | grep coapp

            echo "=== Verify app label ==="
            adb shell dumpsys package com.agent.coapp | grep -E "versionName"

            echo "=== Launch app ==="
            adb shell am start -n com.agent.coapp/.MainActivity -W

            echo "=== Wait for UI ==="
            sleep 5

            echo "=== Take screenshot ==="
            mkdir -p screenshots
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/01-provisioning.png

            echo "=== Switch to Config tab ==="
            adb shell input tap 324 2340
            sleep 2
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/02-config.png

            echo "=== Switch to Skills tab ==="
            adb shell input tap 540 2340
            sleep 2
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/03-skills.png

            echo "=== Switch to Logs tab ==="
            adb shell input tap 756 2340
            sleep 2
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/04-logs.png

            echo "=== Switch to Chat tab ==="
            adb shell input tap 972 2340
            sleep 2
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/05-chat.png

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshots
          path: screenshots/
          retention-days: 7
