name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build & Verify APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Static verification
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          echo "=== Package Info ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump badging "$APK_PATH" | head -3
          echo ""
          echo "=== Application Label ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump badging "$APK_PATH" | grep "application-label"
          echo ""
          echo "=== Permissions ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump permissions "$APK_PATH"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  emulator-test:
    name: Emulator Screenshot Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk/

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD Screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_5
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Installing APK ==="
            adb install apk/app-debug.apk

            echo "=== Verify package ==="
            adb shell pm list packages | grep coapp

            echo "=== Verify app label ==="
            adb shell dumpsys package com.agent.coapp | grep -E "versionName"

            echo "=== Launch app ==="
            adb shell am start -n com.agent.coapp/.MainActivity -W

            echo "=== Wait for UI ==="
            sleep 5

            echo "=== Take screenshot ==="
            mkdir -p screenshots
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/01-provisioning.png

            echo "=== Switch to Config tab ==="
            adb shell "am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS"
            adb shell input keyevent KEYCODE_BACK || true
            sleep 1
            adb shell "uiautomator dump /sdcard/ui.xml" && adb pull /sdcard/ui.xml /tmp/ui.xml || true
            # Click tabs by finding bottom nav text
            adb shell "input tap $(adb shell uiautomator dump /dev/tty | cat /dev/null; adb shell 'dumpsys window displays | grep -o \"cur=[0-9]*x[0-9]*\"' | head -1)" || true
            
            # Use am start with extras to navigate - more reliable
            adb shell am start -n com.agent.coapp/.MainActivity -W
            sleep 2

            # Get screen dimensions
            SCREEN=$(adb shell wm size | grep -oE '[0-9]+x[0-9]+')
            WIDTH=$(echo $SCREEN | cut -dx -f1)
            HEIGHT=$(echo $SCREEN | cut -dx -f2)
            NAV_Y=$((HEIGHT - 50))
            TAB_W=$((WIDTH / 5))

            echo "Screen: ${WIDTH}x${HEIGHT}, NavY: $NAV_Y, TabW: $TAB_W"

            # Tab 1 already captured. Now tap others:
            echo "=== Config tab ==="
            adb shell input tap $((TAB_W * 1 + TAB_W / 2)) $NAV_Y
            sleep 3
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/02-config.png

            echo "=== Skills tab ==="
            adb shell input tap $((TAB_W * 2 + TAB_W / 2)) $NAV_Y
            sleep 3
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/03-skills.png

            echo "=== Logs tab ==="
            adb shell input tap $((TAB_W * 3 + TAB_W / 2)) $NAV_Y
            sleep 3
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/04-logs.png

            echo "=== Chat tab ==="
            adb shell input tap $((TAB_W * 4 + TAB_W / 2)) $NAV_Y
            sleep 3
            adb shell screencap -p /sdcard/screenshot.png
            adb pull /sdcard/screenshot.png screenshots/05-chat.png

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshots
          path: screenshots/
          retention-days: 7
