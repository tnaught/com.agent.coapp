name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build & Verify APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Static verification
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          echo "=== Package Info ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump badging "$APK_PATH" | head -3
          echo ""
          echo "=== Application Label ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump badging "$APK_PATH" | grep "application-label"
          echo ""
          echo "=== Permissions ==="
          ${ANDROID_HOME}/build-tools/34.0.0/aapt dump permissions "$APK_PATH"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  emulator-test:
    name: Emulator Screenshot Test
    runs-on: macos-latest  # macOS runner 对模拟器支持更好
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: apk/

      - name: AVD Screenshot
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          heap-size: 512M
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "=== Installing APK ==="
            adb install apk/app-debug.apk

            echo "=== Verify package ==="
            adb shell pm list packages | grep coapp

            echo "=== Verify app label ==="
            adb shell dumpsys package com.agent.coapp | grep -E "versionName"

            echo "=== Launch app ==="
            adb shell am start -n com.agent.coapp/.MainActivity -W

            echo "=== Wait for UI ==="
            sleep 5

            echo "=== Take screenshot ==="
            adb shell screencap -p /sdcard/launch-screen.png
            adb pull /sdcard/launch-screen.png screenshots/launch-screen.png

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshots
          path: screenshots/
          retention-days: 7
